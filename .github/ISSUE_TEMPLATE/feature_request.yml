name: Feature request
description: 새 도구/스킬/동작을 제안하고 싶을 때
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        이 프로젝트는 집현전 REST API 를 Claude 로 그대로 노출하는 얇은 래퍼입니다.
        **새 도구 제안 전** — 그 기능이 집현전 API 에 이미 존재하는지 먼저 확인해 주세요.
        집현전 쪽 변경이 선행되어야 하는 제안은 [KimJiSeong1994/PaperReview](https://github.com/KimJiSeong1994/PaperReview) 에 먼저 이슈를 열어 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: "Claude 와의 어떤 상호작용이 현재 불편/불가능한가요?"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결
      description: |
        - 새 MCP tool / 기존 tool 확장 / 새 skill / 문서 개선 중 어디에 해당하나요?
        - 집현전 API 중 어떤 엔드포인트를 래핑할지
        - tool input / output 개요
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (considered but rejected)
      description: 다른 방법을 고려했다면 왜 그게 더 나쁜지
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 중요도 (본인 기준)
      options:
        - "nice-to-have"
        - "blocks my workflow"
        - "critical"
    validations:
      required: true
